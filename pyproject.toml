[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = [
  "docs",
  "03-projects/*/tests/fixtures",
  "03-projects/streamflow-containerized-stream-processing/airflow",
  "03-projects/streamflow-containerized-stream-processing/spark",
  "03-projects/streamflow-enterprise-analytics-pipeline/airflow",
]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I", "B", "UP"]
ignore = [
  "UP017", # datetime.UTC requires Python 3.11; projects support Python 3.10.
  "UP042", # StrEnum requires Python 3.11; projects support Python 3.10.
]

[tool.ruff.lint.per-file-ignores]
"api/health.py" = ["E402"]
"api/triage.py" = ["E402"]
"tests/*.py" = ["E402"]
"03-projects/*/tests/*.py" = ["E402"]

[tool.mypy]
python_version = "3.12"
check_untyped_defs = true
disallow_untyped_defs = true
no_implicit_optional = true
explicit_package_bases = true
show_error_codes = true
warn_redundant_casts = true
warn_unused_ignores = true
exclude = [
  "(^|/)tests/fixtures/",
  "03-projects/streamflow-containerized-stream-processing/(airflow|spark)/",
  "03-projects/streamflow-enterprise-analytics-pipeline/airflow/",
]

[[tool.mypy.overrides]]
module = "openai"
ignore_missing_imports = true

[tool.coverage.run]
branch = true
parallel = true
source = [
  "api",
  "03-projects/enablement-assistant/src",
  "03-projects/agentic-workflow-demo/src",
  "03-projects/local-ai-lab-runner/src",
  "03-projects/prompt-regression-runner/src",
  "03-projects/streamflow-containerized-stream-processing/src",
]
omit = [
  "*/tests/*",
  "*/tests/fixtures/*",
  "*/__pycache__/*",
  "*/cli.py",
  "*/live_openai.py",
  "*/producer.py",
  "api/health.py",
  "api/triage.py",
]

[tool.coverage.report]
fail_under = 80
show_missing = true
skip_covered = true
precision = 1

[tool.coverage.html]
directory = "coverage/html"
