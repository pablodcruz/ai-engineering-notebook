name: Link Check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check documentation links
        run: python scripts/check_links.py --site-base-url https://pablodcruz.github.io/ai-engineering-notebook/
