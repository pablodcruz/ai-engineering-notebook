name: Live Triage Smoke Check

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Canonical Vercel deployment URL
        required: true
        type: string

permissions:
  contents: read

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check configured deployment health
        run: python scripts/check_live_triage.py "${{ inputs.base_url }}" --expect-configured
