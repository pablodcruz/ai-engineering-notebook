name: Validate Workspace

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pinned quality tools
        run: python -m pip install -r requirements-dev.txt

      - name: Run workspace validation and engineering quality gate
        run: python scripts/validate_workspace.py --quality

      - name: Upload Enablement eval evidence
        uses: actions/upload-artifact@v4
        with:
          name: enablement-eval-data
          path: docs/enablement-eval-data.json

      - name: Upload coverage evidence
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: coverage/

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install pinned browser-test dependencies
        run: npm ci

      - name: Install isolated Chromium test browser
        run: npx playwright install --with-deps chromium

      - name: Run Support Triage browser tests
        run: npm run test:browser

      - name: Upload Playwright evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
