name: Validate Workspace

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run workspace validation
        run: python scripts/validate_workspace.py

      - name: Upload Enablement eval evidence
        uses: actions/upload-artifact@v4
        with:
          name: enablement-eval-data
          path: docs/enablement-eval-data.json
